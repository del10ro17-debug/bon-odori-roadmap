name: Update Wangan Price DB

on:
  workflow_dispatch:
    inputs:
      query:
        description: Gmail search query. Leave blank to use the 180-day Wangan default.
        required: false
        default: 'subject:"湾岸マンション価格ナビ" newer_than:180d'
      max_results:
        description: Maximum Gmail messages to scan.
        required: false
        default: "500"
  schedule:
    # Every Friday at 18:00 JST.
    - cron: "0 9 * * 5"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r tools/wangan_price_db/requirements.txt

      - name: Sync Gmail price emails
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          WANGAN_GMAIL_QUERY: ${{ inputs.query || vars.WANGAN_GMAIL_QUERY }}
          WANGAN_GMAIL_MAX_RESULTS: ${{ inputs.max_results || vars.WANGAN_GMAIL_MAX_RESULTS }}
        run: |
          python tools/wangan_price_db/sync_gmail_prices.py \
            --db data/wangan_prices.sqlite

      - name: Export dashboard data
        run: |
          python tools/wangan_price_db/export_dashboard_data.py \
            --db data/wangan_prices.sqlite \
            --output docs/wangan-price-dashboard/data.js \
            --public-safe

      - name: Commit updated database and dashboard data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update wangan price database"
          file_pattern: data/wangan_prices.sqlite docs/wangan-price-dashboard/data.js
